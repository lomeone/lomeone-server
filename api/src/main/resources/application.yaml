spring:
  application:
    name: texhol-server
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:test
    username: lomeone-db
    password: mY3i7fj@3agwct2
    hikari:
      maximum-pool-size: 4
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

server:
  shutdown: graceful

cloud:
  aws:
    region:
      static: ap-northeast-2
    stack:
      auto: false
    s3:
      bucket: mms-images-data
    dynamodb:
      region: ap-northeast-2
      host: https://dynamodb.ap-northeast-2.amazonaws.com

texhol:
  database:
    datasource:
      primary:
        secret-id: prod/texhol-db-credentials
        hostname: oracle-mysql.lomeone.com
        port: 3306
        database-name: texhol
        driver-class-name: com.mysql.cj.jdbc.Driver
      read-only:
        secret-id: prod/texhol-db-credentials
        hostname: oracle-mysql.lomeone.com
        port: 3306
        database-name: texhol
        driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    root: INFO

otel:
  exporter:
    otlp:
      endpoint: http://jaeger-inmemory-instance-collector.observability.svc.cluster.local:4317
      protocol: grpc
  logs:
    exporter: none
  metrics:
    exporter: none
